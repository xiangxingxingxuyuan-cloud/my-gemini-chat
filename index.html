<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Gemini AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
        }
        .user-message {
            background: #007bff;
            color: white;
            margin-left: auto;
        }
        .bot-message {
            background: white;
            color: #333;
            margin-right: auto;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-area {
            background: white;
            padding: 15px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }
        #sendBtn {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
        }
        #sendBtn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>

    <script>
        // 替换成你自己的 API Key
        const API_KEY = "AIzaSyBWE9X7HR-VvoxFzx4JhKbzyI_2O5KIwbY";
        const MODEL_NAME = "gemini-1.0-pro";
        const chatContainer = document.getElementById("chatContainer");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        function addMessage(text, isUser) {
            const div = document.createElement("div");
            div.className = `message ${isUser ? "user-message" : "bot-message"}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function askGemini(question) {
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1/models/${MODEL_NAME}:generateContent?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: question }] }]
                        })
                    }
                );

                const data = await response.json();

                if (data.error) {
                    return `❌ API 错误：${data.error.message}\n请检查 API Key 是否正确或配额是否用尽。`;
                }

                if (!data.candidates || data.candidates.length === 0) {
                    return "⚠️ 抱歉，AI 未能返回有效回答，请重试。";
                }

                const candidate = data.candidates[0];
                if (!candidate.content || !candidate.content.parts || candidate.content.parts.length === 0) {
                    return "⚠️ 抱歉，回答内容格式异常，请重试。";
                }

                return candidate.content.parts[0].text;
            } catch (error) {
                console.error("请求异常：", error);
                return "❌ 网络错误：" + error.message + "\n请检查网络连接。";
            }
        }

        sendBtn.addEventListener("click", async () => {
            const text = userInput.value.trim();
            if (!text) return;

            sendBtn.disabled = true;
            sendBtn.textContent = "发送中...";

            addMessage(text, true);
            userInput.value = "";
            addMessage("🤖 思考中...", false);

            const answer = await askGemini(text);
            chatContainer.removeChild(chatContainer.lastChild);
            addMessage(answer, false);

            sendBtn.disabled = false;
            sendBtn.textContent = "发送";
        });

        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendBtn.click();
        });
    </script>
</body>
</html>
