<!DOCTYPE html>

    <style>
        * {

        }
        body {
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 18px;

        }
        .user-message {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

            color: #333;
            margin-right: auto;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-area {
            background: white;
            padding: 15px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;   填充：12px 16px；
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }
        #sendBtn {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
        }
        #sendBtn:hover {
            background: #0056b3;
        }
    </style>
</head>
